<html lang="en">
<head>
<meta charset="UTF-8">

<title>Study Replan — Apr 9–21</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f6fa;--card:#fff;--border:#e0e2ea;--text:#1e1f26;--text-dim:#6b7084;
  --accent:#059669;--accent-dim:#d1fae5;
  --micro:#059669;--pharma:#6366f1;--patho:#e11d48;
  --rev-micro:#86efac;--rev-pharma:#a5b4fc;--rev-patho:#fda4af;

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:0 1.5rem 2rem}
header{padding:2rem 0 1rem}
header h1{font-family:'Fraunces',serif;font-weight:900;font-size:1.8rem;background:linear-gradient(135deg,var(--micro),var(--pharma),var(--patho));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text-dim);margin-top:.3rem;font-size:.85rem}
.summary{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;overflow:hidden}
.summary::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--micro),var(--pharma),var(--patho))}
.summary h3{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;margin-bottom:.6rem}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.sum-card{padding:.6rem;border-radius:8px;border:1px solid var(--border)}
.sum-card h4{font-size:.78rem;margin-bottom:.3rem}
.sum-card .sc-row{display:flex;justify-content:space-between;font-size:.72rem;padding:.15rem 0;color:var(--text-dim)}
.sum-card .sc-row .scv{font-weight:700;color:var(--text)}
.sum-card.mc{border-left:3px solid var(--micro)}.sum-card.mc h4{color:var(--micro)}
.sum-card.pc{border-left:3px solid var(--pharma)}.sum-card.pc h4{color:var(--pharma)}
.sum-card.tc{border-left:3px solid var(--patho)}.sum-card.tc h4{color:var(--patho)}
.avail-bar{display:flex;gap:.15rem;height:10px;border-radius:5px;overflow:hidden;margin-top:.4rem}
.avail-bar div{border-radius:3px;transition:width .3s}

.progress-wrap{margin-bottom:1.2rem}
.progress-bar{height:5px;background:rgba(0,0,0,.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--micro),var(--pharma),var(--patho))}

/* Day cards */
.day-grid{display:grid;gap:.8rem}
.day-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;transition:all .2s;position:relative}
.day-row:hover{box-shadow:0 4px 12px rgba(0,0,0,.07);transform:translateY(-1px)}
.day-row.completed{opacity:.6}
.day-row.completed::after{content:'✓ Done';position:absolute;top:.8rem;right:1rem;font-size:.7rem;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:.15rem .5rem;border-radius:4px}
.day-row.is-today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.day-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.day-hdr .dh-left{display:flex;align-items:center;gap:.5rem}
.day-hdr .day-date{font-family:'Fraunces',serif;font-weight:700;font-size:1rem}
.day-hdr .day-dow{font-size:.7rem;color:var(--text-dim);text-transform:uppercase}
.day-hdr .day-total{font-size:.8rem;font-weight:700;color:var(--text-dim)}
.day-blocks{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.5rem}
.block{padding:.5rem .7rem;border-radius:8px;border-left:3px solid}
.block.b-micro{border-color:var(--micro);background:rgba(5,150,105,.04)}
.block.b-pharma{border-color:var(--pharma);background:rgba(99,102,241,.04)}
.block.b-patho{border-color:var(--patho);background:rgba(225,29,72,.04)}
.block.b-rev-micro{border-color:var(--rev-micro);background:rgba(134,239,172,.08)}
.block.b-rev-pharma{border-color:var(--rev-pharma);background:rgba(165,180,252,.08)}
.block.b-rev-patho{border-color:var(--rev-patho);background:rgba(253,164,175,.08)}
.block .bl-hdr{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem}
.block.b-micro .bl-hdr{color:var(--micro)}
.block.b-pharma .bl-hdr{color:var(--pharma)}
.block.b-patho .bl-hdr{color:var(--patho)}
.block.b-rev-micro .bl-hdr{color:#16a34a}
.block.b-rev-pharma .bl-hdr{color:#818cf8}
.block.b-rev-patho .bl-hdr{color:#fb7185}
.block .bl-items{font-size:.72rem;color:var(--text-dim);line-height:1.5}
.block .bl-items .ch{margin-bottom:.15rem}
.block .bl-items .ch .hrs{font-weight:600;color:var(--text)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:500px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:slideUp .3s}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;margin-bottom:.6rem}
.modal-actions{display:flex;gap:.4rem;margin-top:.8rem}
.modal-btn{border:none;padding:.45rem 1rem;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.82rem;transition:all .2s}
.modal-btn.toggle{background:var(--accent-dim);color:var(--accent)}
.modal-btn.toggle:hover{background:var(--accent);color:#fff}
.modal-btn.undo{background:rgba(225,29,72,.1);color:var(--patho)}
.modal-btn.close{background:rgba(0,0,0,.06);color:var(--text-dim)}

.legend{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:.25rem;font-size:.68rem;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:3px}

.footer-note{font-size:.72rem;color:var(--text-dim);line-height:1.45;margin-top:1rem}
.footer-note strong{color:var(--text)}

@media(max-width:700px){.sum-grid{grid-template-columns:1fr}.day-blocks{grid-template-columns:1fr}}
</style>
</head>

let GH_TOKEN=localStorage.getItem('sp_gh_token')||'';
async function gistSave(){
  if(!GH_TOKEN)return;
  try{
    const body={description:"Study Replan Progress",public:false,files:{"replan.json":{content:JSON.stringify(completed)}}};
    let url='https://api.github.com/gists',method='POST';
    if(GIST_ID){url+='/'+GIST_ID;method='PATCH';}
    const r=await fetch(url,{method,headers:{'Authorization':'token '+GH_TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const d=await r.json();if(!GIST_ID){GIST_ID=d.id;localStorage.setItem('sp_gist_id',GIST_ID);}}
  }catch(e){console.error(e);}
}
async function gistLoad(){
  if(!GH_TOKEN||!GIST_ID)return false;
  try{
    const r=await fetch('https://api.github.com/gists/'+GIST_ID,{headers:{'Authorization':'token '+GH_TOKEN}});
    if(!r.ok)return false;
    const d=await r.json();
    const c=d.files['replan.json']?.content;

        <span><strong style="color:var(--text)">${pct}%</strong> progress</span>
      </div>
      <div class="progress-wrap" style="margin-top:.5rem"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--micro)"></div>Micro (new)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--pharma)"></div>Pharma (new)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--patho)"></div>Patho (new)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rev-micro)"></div>Micro (revision)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rev-pharma)"></div>Pharma (revision)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rev-patho)"></div>Patho (revision)</div>
    </div>

    <div class="day-grid">
  `;

  schedule.forEach((day,i)=>{
    const isDone=completed[i];
    const isToday=day.isToday;
    html+=`<div class="day-row${isDone?' completed':''}${isToday?' is-today':''}" onclick="toggleDay(${i})">
      <div class="day-hdr">
        <div class="dh-left">
          <span class="day-date">${day.date}</span>
          <span class="day-dow">${day.dow}${isToday?' · TODAY':''}</span>
        </div>
        <span class="day-total">${day.hrs}h</span>
      </div>
      <div class="day-blocks">`;

    day.blocks.forEach(b=>{
      const cls=b.type==='rev'?`b-rev-${b.sub}`:`b-${b.sub}`;
      html+=`<div class="block ${cls}">
        <div class="bl-hdr">${b.label} · ${b.hrs}h</div>
        <div class="bl-items">`;
      b.items.forEach(it=>{
        html+=`<div class="ch">${it.n} — <span class="hrs">${it.h}h</span></div>`;
      });
      html+=`</div></div>`;
    });

    html+=`</div></div>`;
  });

  html+=`</div>
    <div class="footer-note">
      <strong>Strategy:</strong> Apr 9–15: Finish all remaining new chapters (Micro 10 ch, Pharma 5 ch, Patho 5 ch) while starting revision for Pharma and Patho. Apr 15–18: Intensive revision of all completed content, organized by system. Apr 19: Grand integrated revision across all three subjects. Apr 20–21: Final pass with high-yield focus and practice questions. Click any day to mark it complete.
    </div>
  `;
  app.innerHTML=html;
}

function toggleDay(i){
  const ov=document.getElementById('modalOverlay');
  const day=schedule[i];
  const isDone=completed[i];

  let body=`<h3>${day.date} ${day.dow} — ${day.hrs}h${day.isToday?' (Today)':''}</h3>`;
  day.blocks.forEach(b=>{
    const color=b.sub==='micro'?'var(--micro)':b.sub==='pharma'?'var(--pharma)':'var(--patho)';
    body+=`<div style="margin:.5rem 0;padding:.5rem .7rem;border-left:3px solid ${color};border-radius:6px;background:rgba(0,0,0,.02)">
      <div style="font-size:.78rem;font-weight:700;color:${color}">${b.label} · ${b.hrs}h</div>`;
    b.items.forEach(it=>{
      body+=`<div style="font-size:.75rem;color:var(--text-dim);padding:.15rem 0">${it.n} — <strong>${it.h}h</strong></div>`;
    });
    body+=`</div>`;
  });
  body+=`<div class="modal-actions">
    <button class="modal-btn ${isDone?'undo':'toggle'}" onclick="doToggle(${i})">${isDone?'✕ Mark Incomplete':'✓ Mark Complete'}</button>
    <button class="modal-btn close" onclick="document.getElementById('modalOverlay').classList.remove('show')">Close</button>
  </div>`;
  document.getElementById('modal').innerHTML=body;
  ov.classList.add('show');
}

function doToggle(i){
  completed[i]=!completed[i];
  saveState();gistSave();render();
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show');};

render();
(async()=>{if(GH_TOKEN){const ok=await gistLoad();if(ok)render();}})();
</script>
</body>
</html>
